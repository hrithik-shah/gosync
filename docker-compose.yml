name: gosync

# Variables populated from .env in the same directory as this file. See .env.example for reference.
services:
  postgres:
    image: postgres:17-alpine
    container_name: gosync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gosync_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres   # overrides .env's "localhost" — container-to-container
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres_data: